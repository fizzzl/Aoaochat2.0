<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>数据看板 · 嗷嗷聊天二代</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:system-ui,-apple-system,sans-serif;background:#f1f5f9;min-height:100vh}
    .nav{display:flex;gap:2px;padding:16px 16px 0;flex-wrap:wrap}
    .nav a{padding:9px 20px;border-radius:8px 8px 0 0;font-size:13px;text-decoration:none;color:#434655;background:#fff;font-weight:500}
    .nav a.active{background:#2563EB;color:#fff}
    .content{padding:16px;max-width:900px;margin:0 auto}
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}
    .card{background:#fff;border-radius:12px;padding:20px}
    .card .label{font-size:12px;color:#737686;margin-bottom:6px}
    .card .value{font-size:32px;font-weight:700;color:#0b1c30}
    .card .change{font-size:12px;margin-top:4px}
    .green{color:#22c55e}.yellow{color:#f59e0b}
    .panel{background:#fff;border-radius:12px;padding:20px;margin-top:12px}
    .panel h3{font-size:15px;margin-bottom:12px;color:#0b1c30}
    .tag{display:inline-block;background:#eff4ff;color:#2563EB;padding:4px 12px;border-radius:12px;font-size:12px;margin:3px}
    .logout{float:right;font-size:13px;color:#ef4444;cursor:pointer;background:none;border:none;margin-top:8px}
  </style>
</head>
<body>
  <div class="nav">
    <a href="index.html" class="active">📊 数据看板</a>
    <a href="users.html">👥 用户管理</a>
    <a href="messages.html">💬 消息监控</a>
    <a href="logs.html">📋 系统日志</a>
    <button class="logout" onclick="logout()">退出</button>
  </div>
  <div class="content">
    <div class="cards" id="stats"></div>
  </div>
  <script>
    const token = localStorage.getItem('token');
    if (!token) location.href = 'login.html';

    async function api(path) {
      const res = await fetch(path, { headers: { Authorization: `Bearer ${token}` } });
      if (res.status === 401) { localStorage.clear(); location.href = 'login.html'; }
      return res.json();
    }

    function logout() { localStorage.clear(); location.href = 'login.html'; }

    (async () => {
      const { data } = await api('/api/admin/stats');
      document.getElementById('stats').innerHTML = `
        <div class="card"><div class="label">注册用户</div><div class="value">${data.totalUsers}</div></div>
        <div class="card"><div class="label">24h 活跃</div><div class="value">${data.dailyActive}</div></div>
        <div class="card"><div class="label">今日消息</div><div class="value">${data.todayMessages}</div></div>
        <div class="card"><div class="label">今日通话</div><div class="value">${data.todayCalls}</div></div>
      `;
    })();
  </script>
</body>
</html>
